# E2E Test: Forgot Password Flow
# Verifies forgot password navigation and reset link request

appId: com.ttportal.app

---

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Navigate to sign-in
- extendedWaitUntil:
    visible: "TT PORTAL"
    timeout: 15000
- tapOn: "Adaugă"
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000

# Switch to login tab to see forgot password link
- tapOn:
    id: "tab-login"

# Tap forgot password
- tapOn:
    id: "forgot-password-link"

# Verify forgot password screen
- extendedWaitUntil:
    visible: "Resetează parola"
    timeout: 5000

# Fill in valid email
- tapOn:
    text: "Email"
- inputText: "test@ttportal.ro"

# Submit reset request
- tapOn: "Trimite link de resetare"

# Should show success message
- extendedWaitUntil:
    visible:
      id: "success-message"
    timeout: 10000

# Navigate back to login
- tapOn:
    id: "back-to-login"

# Should be back on sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 5000
