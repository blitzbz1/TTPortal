# Local observability stack: Prometheus, Loki, Promtail, Grafana, Tempo, OTel Collector.
# Runs alongside the Supabase CLI stack (which exposes Postgres on host:54322
# and the Edge Runtime as a Docker container named supabase_edge_runtime_*).
#
# Start: ./scripts/start-observability.sh
# Stop:  ./scripts/stop-observability.sh
# Grafana: http://localhost:3001 (admin/admin)

name: ttportal-observability

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: ttportal_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle

  loki:
    image: grafana/loki:3.2.0
    container_name: ttportal_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  promtail:
    image: grafana/promtail:3.2.0
    container_name: ttportal_promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ttportal_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_LOGIN_MAXIMUM_INVALID_LOGIN_ATTEMPTS: 0
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    container_name: ttportal_tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo.yml"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: ttportal_otel_collector
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel-collector/config.yml:/etc/otel-collector/config.yml:ro
    command: ["--config=/etc/otel-collector/config.yml"]
    depends_on:
      - tempo

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data:
