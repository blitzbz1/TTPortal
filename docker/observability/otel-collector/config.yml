receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

connectors:
  # Derives RED metrics (Rate, Errors, Duration) from incoming spans so the
  # Traces dashboard's Prometheus panels work without re-deriving from logs.
  spanmetrics:
    namespace: edge_functions
    histogram:
      explicit:
        buckets: [10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - name: http.route
      - name: http.request.method
      - name: http.response.status_code

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, spanmetrics]

    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
