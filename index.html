<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Portal — Mese Tenis România</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-card">
    <div class="splash-logo">
      <div class="splash-badge">🏓</div>
      <div class="splash-title">TT PORTAL</div>
      <div class="splash-sub" id="splash-sub">Găsește o masă de tenis în România</div>
    </div>
    <div class="splash-actions">
      <button class="splash-btn-primary" id="splash-locate-btn" onclick="splashLocate()">
        <span>📍</span>
        <span id="splash-locate-label">Folosește locația mea</span>
      </button>
      <div class="splash-or" id="splash-or">sau alege un oraș</div>
      <div class="splash-city-grid" id="splash-city-grid"></div>
    </div>
    <div class="splash-lang">
      <button class="lang-btn" id="splash-lang-en" onclick="setSplashLang('en')">EN</button>
      <button class="lang-btn active" id="splash-lang-ro" onclick="setSplashLang('ro')">RO</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="/" onclick="resetView(event)">
    <div class="logo-badge">🏓</div>
    <div><div class="logo-text">TT PORTAL</div><div class="logo-sub">Find a Table</div></div>
  </a>
  <div class="header-center">
    <button class="city-switcher" id="city-switcher" onclick="openCitySwitcher()">
      <span id="current-city-label">România</span>
      <span style="font-size:10px;opacity:.6">▾</span>
    </button>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="lang-ro" onclick="setLang('ro')">RO</button>
    </div>
    <button class="btn-add" onclick="openAddModal()" id="btn-add-main">
      <span style="font-size:14px;line-height:1">+</span>
      <span data-i18n="addVenue">Add venue</span>
    </button>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle">
      <span id="sidebar-toggle-icon">▲</span>
      <span id="sidebar-toggle-label">venues</span>
    </div>
    <div class="sidebar-toolbar">
      <div class="search-wrap" style="flex:1">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search venues…" id="search-input" oninput="filterVenues()">
      </div>
      <button class="btn-near-sidebar" id="btn-near" onclick="toggleNearMe()">
        📍 <span id="btn-near-label">Near me</span>
      </button>
    </div>
    <div class="filters">
      <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
      <div class="filter-chip" onclick="setFilter('parc_exterior',this)">🌳 Parks</div>
      <div class="filter-chip" onclick="setFilter('sala_indoor',this)">🏢 Indoor</div>
      <div class="filter-chip" onclick="setFilter('verified',this)">✓ Verified</div>
    </div>
    <div class="list-header" id="list-header">Loading…</div>
    <div class="venues-list" id="venues-list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div style="flex:1">
      <div class="detail-title" id="dp-name"></div>
      <div style="margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap" id="dp-badges"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
      <button class="btn-close" onclick="closeDetail()">✕</button>
      <button class="btn-close" onclick="openEditModal()" style="background:var(--green);color:#fff;border-color:var(--green)">✏️</button>
    </div>
  </div>
  <div class="detail-body" id="dp-body"></div>
</div>

<!-- CITY SWITCHER MODAL -->
<div class="modal-backdrop" id="city-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-head">
      <div class="modal-title" id="city-modal-title">Alege orașul</div>
      <button class="btn-close" onclick="closeCitySwitcher()">✕</button>
    </div>
    <div class="modal-body" style="gap:8px">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="city-search" placeholder="Caută oraș…" oninput="filterCityList()">
      </div>
      <div id="city-list" style="display:flex;flex-direction:column;gap:4px;max-height:340px;overflow-y:auto;padding-right:4px"></div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Adaugă locație</div>
      <button class="btn-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nume *</label><input class="form-input" id="f-name" placeholder="ex: Parcul Central"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tip *</label>
          <select class="form-select" id="f-type">
            <option value="parc_exterior">Parc exterior</option>
            <option value="sala_indoor">Sală indoor</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Nr. mese</label><input class="form-input" id="f-tables" type="number" min="1" placeholder="#"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Oraș *</label><input class="form-input" id="f-city" placeholder="ex: Cluj-Napoca"></div>
        <div class="form-group"><label class="form-label">Județ</label><input class="form-input" id="f-county" placeholder="ex: Cluj"></div>
      </div>
      <div class="form-group"><label class="form-label">Sector / Zonă</label><input class="form-input" id="f-sector" placeholder="ex: Sector 1 / Centru"></div>
      <div class="form-group">
        <label class="form-label">Adresă *</label>
        <div style="display:flex;gap:6px">
          <input class="form-input" id="f-address" placeholder="Adresă completă" style="flex:1">
          <button onclick="geocodeAddress()" id="geo-btn" style="padding:7px 12px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit;color:var(--ink-muted)">📍 Localizează</button>
        </div>
        <div id="geo-status" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="form-group"><label class="form-label">Program</label><input class="form-input" id="f-hours" placeholder="ex: Luni–Vineri 9–22"></div>
      <div class="form-group"><label class="form-label">Note</label><textarea class="form-textarea" id="f-desc" placeholder="Detalii utile pentru comunitate…"></textarea></div>
      <div id="geo-preview" style="display:none;font-size:11px;color:var(--ink-faint);background:var(--cream-dark);padding:8px 10px;border-radius:6px">📍 <span id="geo-preview-text"></span></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAddModal()">Anulează</button>
      <button class="btn-submit" onclick="submitVenue()">Adaugă →</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-backdrop" id="review-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Scrie o recenzie</div><button class="btn-close" onclick="closeReviewModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Numele tău</label><input class="form-input" id="r-name" placeholder="Poreclă sau prenume"></div>
      <div class="form-group"><label class="form-label">Notă *</label>
        <div class="star-select">
          <button class="star-btn" onclick="setRating(1)">★</button>
          <button class="star-btn" onclick="setRating(2)">★</button>
          <button class="star-btn" onclick="setRating(3)">★</button>
          <button class="star-btn" onclick="setRating(4)">★</button>
          <button class="star-btn" onclick="setRating(5)">★</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Recenzie *</label><textarea class="form-textarea" id="r-text" placeholder="Starea meselor? Atmosferă?"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeReviewModal()">Anulează</button>
      <button class="btn-submit" onclick="submitReview()">Publică →</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Editează locația</div><button class="btn-close" onclick="closeEditModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nume *</label><input class="form-input" id="e-name"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tip *</label>
          <select class="form-select" id="e-type">
            <option value="parc_exterior">Parc exterior</option>
            <option value="sala_indoor">Sală indoor</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Stare</label>
          <select class="form-select" id="e-stare">
            <option value="buna">Bună</option>
            <option value="acceptabila">Acceptabilă</option>
            <option value="deteriorata">Deteriorată</option>
            <option value="necunoscuta">Necunoscută</option>
            <option value="profesionala">Profesională</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Oraș *</label><input class="form-input" id="e-city"></div>
        <div class="form-group"><label class="form-label">Județ</label><input class="form-input" id="e-county"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Adresă *</label>
        <div style="display:flex;gap:6px">
          <input class="form-input" id="e-address" style="flex:1">
          <button onclick="geocodeEditAddress()" id="e-geo-btn" style="padding:7px 12px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit;color:var(--ink-muted)">📍 Localizează</button>
        </div>
        <div id="e-geo-status" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sector / Zonă</label><input class="form-input" id="e-sector"></div>
        <div class="form-group"><label class="form-label">Nr. mese</label><input class="form-input" id="e-tables" type="number" min="1"></div>
      </div>
      <div class="form-group"><label class="form-label">Program</label><input class="form-input" id="e-hours"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tarif</label><input class="form-input" id="e-tarif" placeholder="ex: 30 lei/oră"></div>
        <div class="form-group"><label class="form-label">Website</label><input class="form-input" id="e-website" placeholder="https://..."></div>
      </div>
      <div class="form-group"><label class="form-label">Tags (virgulă)</label><input class="form-input" id="e-tags"></div>
      <div class="form-group"><label class="form-label">Descriere</label><textarea class="form-textarea" id="e-desc"></textarea></div>
      <div class="form-group">
        <label class="form-label">Fotografii</label>
        <div id="e-photo-strip" class="photo-strip"></div>
        <input type="file" id="e-photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotoUpload(event)">
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px" id="e-photo-status"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Lat</label><input class="form-input" id="e-lat" type="number" step="0.00001"></div>
        <div class="form-group"><label class="form-label">Lng</label><input class="form-input" id="e-lng" type="number" step="0.00001"></div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="e-acces_gratuit"> Acces gratuit</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="e-nocturna"> Iluminat nocturn</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="e-fileuri"> Fileuri prezente</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer"><input type="checkbox" id="e-verificat"> Verificat</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Anulează</button>
      <button class="btn-submit" onclick="submitEdit()">Salvează →</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
